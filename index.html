<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Find Your UNI</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>🎓 Find Your UNI</h1>

    <p class="subtitle">
      Discover universities from the QS Top 100
      based on your GPA or Rapor score.
    </p>

    <!-- CONTROLS -->
    <div class="controls">

      <!-- INPUT TYPE -->
      <div class="input-group">

        <label>
          Choose Input Type
        </label>

        <select id="inputType">

          <option value="gpa">
            GPA (0–4)
          </option>

          <option value="rapor">
            Rapor (0–100)
          </option>

        </select>

      </div>

      <!-- SCORE -->
      <div class="input-group">

        <label>
          Enter Your Score
        </label>

        <input
          type="number"
          id="score"
          placeholder="Enter GPA or Rapor"
          step="0.01"
        >

      </div>

      <!-- MAJOR -->
      <div class="input-group">

        <label>
          Select Major
        </label>

        <select id="major">

          <option value="general">
            General
          </option>

          <option value="engineering">
            Engineering
          </option>

          <option value="computer_science">
            Computer Science
          </option>

          <option value="business">
            Business
          </option>

          <option value="economics">
            Economics
          </option>

          <option value="medicine">
            Medicine
          </option>

        </select>

      </div>

    </div>

    <!-- BUTTONS -->
    <div class="button-group">

      <button
        class="primary-btn"
        onclick="findUniversities()"
      >
        🔍 Find Universities
      </button>

      <button
        class="secondary-btn"
        onclick="toggleCalculator()"
      >
        📊 Rapor Calculator
      </button>

    </div>

    <!-- RAPOR CALCULATOR -->
    <div
      id="calculator"
      class="calculator hidden"
    >

      <h2>
        📘 Rapor Average Calculator
      </h2>

      <p>
        Enter your 4 semester grades to calculate
        your average score and estimated GPA.
      </p>

      <div class="semester-grid">

        <input
          type="number"
          id="s1"
          placeholder="Grade 10 Semester 1"
        >

        <input
          type="number"
          id="s2"
          placeholder="Grade 10 Semester 2"
        >

        <input
          type="number"
          id="s3"
          placeholder="Grade 11 Semester 1"
        >

        <input
          type="number"
          id="s4"
          placeholder="Grade 11 Semester 2"
        >

      </div>

      <button
        class="primary-btn"
        onclick="calculateAverage()"
      >
        Calculate GPA
      </button>

      <div id="avgResult"></div>

    </div>

    <!-- RESULTS -->
    <div id="results"></div>

  </div>

  <!-- SCRIPTS -->
  <script src="data.js"></script>

  <script src="script.js"></script>

</body>

</html>
