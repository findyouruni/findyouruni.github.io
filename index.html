<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Find Your UNI</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>🎓 Find Your UNI</h1>

    <p class="subtitle">
      Discover universities from the QS Top 100 based on your GPA or rapor score.
    </p>

    <div class="controls">

      <select id="inputType">
        <option value="gpa">GPA (0 - 4)</option>
        <option value="rapor">Rapor Score (0 - 100)</option>
      </select>

      <input
        type="number"
        id="score"
        placeholder="Enter your GPA or Rapor Score"
      />

      <button onclick="findUniversities()">
        Find Universities
      </button>

      <button onclick="toggleCalculator()">
        📊 Rapor Calculator
      </button>

    </div>

    <div id="calculator" class="calculator hidden">

      <h2>Rapor Average Calculator</h2>

      <div class="semester-grid">

        <input type="number" id="s1" placeholder="Grade 10 Semester 1">
        <input type="number" id="s2" placeholder="Grade 10 Semester 2">
        <input type="number" id="s3" placeholder="Grade 11 Semester 1">
        <input type="number" id="s4" placeholder="Grade 11 Semester 2">

      </div>

      <button onclick="calculateAverage()">
        Calculate Average
      </button>

      <div id="avgResult"></div>

    </div>

    <div id="results"></div>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>

</body>

</html>
