<!DOCTYPE html>
<html>
<head>
  <title>Find Your UNI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎓 Find Your UNI</h1>

<div class="controls">
  <select id="inputType">
    <option value="gpa">GPA (0–4)</option>
    <option value="rapor">Rapor (0–100)</option>
  </select>

  <input type="number" id="score" placeholder="Enter score">

  <select id="major">
    <option value="general">General</option>
    <option value="engineering">Engineering</option>
    <option value="computer_science">Computer Science</option>
    <option value="business">Business</option>
    <option value="economics">Economics</option>
    <option value="medicine">Medicine</option>
  </select>

  <button onclick="findUniversities()">Find Universities</button>
  <button onclick="toggleCalculator()">📊 Rapor Calculator</button>
</div>

<div id="calculator" class="calculator hidden">
  <h3>Rapor Average Calculator</h3>
  <input type="number" id="s1" placeholder="Grade 10 Sem 1">
  <input type="number" id="s2" placeholder="Grade 10 Sem 2">
  <input type="number" id="s3" placeholder="Grade 11 Sem 1">
  <input type="number" id="s4" placeholder="Grade 11 Sem 2">
  <button onclick="calculateAverage()">Calculate</button>
  <p id="avgResult"></p>
</div>

<div id="results"></div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
