<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Find Your UNI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="hero">
  <h1>🎓 Find Your UNI</h1>
  <p>Kel 3: Cherie, Darren, Madeline, Nathan, Nikita</p>

  <div class="input-card">

    <select id="inputType">
      <option value="gpa">GPA</option>
      <option value="rapor">Rapor (0–100)</option>
    </select>

    <select id="major">
      <option value="general">General</option>
      <option value="cs">Computer Science</option>
      <option value="business">Business</option>
      <option value="engineering">Engineering</option>
      <option value="medicine">Medicine</option>
    </select>

    <input type="number" id="score" placeholder="Enter your score">

    <button onclick="findUniversities()">Find Matches</button>

    <p class="hint">Rapor will be converted automatically</p>

  </div>
</div>

<div id="results" class="results"></div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
